<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">Mockup Galpao Cultural</title>
  <desc id="desc">Sugestao visual editorial e tradicionalista para site Cultura Gaucha, com tons de papel, couro, lenço e bandeira do Rio Grande do Sul.</desc>
  <defs>
    <pattern id="paper" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#f3e8d0"/>
      <circle cx="12" cy="18" r="1.2" fill="#c6a776" opacity="0.26"/>
      <circle cx="58" cy="48" r="1.4" fill="#c6a776" opacity="0.22"/>
      <path d="M0 79 H80" stroke="#dfc79b" stroke-opacity="0.22"/>
    </pattern>
    <pattern id="lenco" width="64" height="64" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="64" height="64" fill="#b51f2a"/>
      <path d="M0 16 H64 M0 48 H64" stroke="#f3e8d0" stroke-opacity="0.55" stroke-width="3"/>
      <path d="M16 0 V64 M48 0 V64" stroke="#f3e8d0" stroke-opacity="0.45" stroke-width="3"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#2b1a0f" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1440" height="960" fill="url(#paper)"/>
  <rect x="0" y="0" width="1440" height="22" fill="#0b5d35"/>
  <rect x="0" y="22" width="1440" height="18" fill="#b51f2a"/>
  <rect x="0" y="40" width="1440" height="14" fill="#e5b82e"/>

  <rect x="64" y="76" width="1312" height="92" rx="18" fill="#1e1b16" filter="url(#softShadow)"/>
  <rect x="64" y="76" width="1312" height="20" rx="10" fill="url(#lenco)" opacity="0.72"/>
  <text x="112" y="128" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#f3e8d0">Cultura Gaucha</text>
  <text x="113" y="151" font-family="Arial, sans-serif" font-size="13" letter-spacing="2.2" fill="#e5b82e">ALMANAQUE DE TRADICOES DO SUL</text>
  <text x="744" y="132" font-family="Arial, sans-serif" font-size="16" fill="#f3e8d0">Contos</text>
  <text x="836" y="132" font-family="Arial, sans-serif" font-size="16" fill="#f3e8d0">Musica</text>
  <text x="932" y="132" font-family="Arial, sans-serif" font-size="16" fill="#f3e8d0">Simbolos</text>
  <text x="1042" y="132" font-family="Arial, sans-serif" font-size="16" fill="#f3e8d0">Gastronomia</text>
  <rect x="1202" y="105" width="120" height="42" rx="8" fill="#e5b82e"/>
  <text x="1231" y="132" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1e1b16">Buscar</text>

  <rect x="96" y="214" width="760" height="430" rx="12" fill="#fff8e9" stroke="#d7ba83" stroke-width="2" filter="url(#softShadow)"/>
  <rect x="96" y="214" width="760" height="18" fill="url(#lenco)" opacity="0.85"/>
  <text x="144" y="296" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#b51f2a">ESPECIAL FARROUPILHA</text>
  <text x="144" y="365" font-family="Georgia, serif" font-size="68" font-weight="700" fill="#1e1b16">Um galpao aberto</text>
  <text x="144" y="438" font-family="Georgia, serif" font-size="68" font-weight="700" fill="#1e1b16">para a memoria.</text>
  <text x="148" y="493" font-family="Arial, sans-serif" font-size="22" fill="#5b402c">Conteudos com textura editorial, calor visual e</text>
  <text x="148" y="526" font-family="Arial, sans-serif" font-size="22" fill="#5b402c">referencias ao mate, ao campo, ao couro e ao lenco.</text>
  <rect x="148" y="560" width="182" height="52" rx="8" fill="#0b5d35"/>
  <text x="183" y="593" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#f3e8d0">Abrir almanaque</text>
  <rect x="350" y="560" width="166" height="52" rx="8" fill="#fff8e9" stroke="#b51f2a" stroke-width="2"/>
  <text x="384" y="593" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#b51f2a">Ver tradicoes</text>

  <rect x="908" y="214" width="436" height="430" rx="12" fill="#6b3f22" filter="url(#softShadow)"/>
  <rect x="934" y="240" width="384" height="378" rx="8" fill="#f3e8d0"/>
  <polygon points="934,240 1318,240 934,365" fill="#0b5d35" opacity="0.95"/>
  <polygon points="934,352 1318,240 1318,478 934,594" fill="#b51f2a" opacity="0.94"/>
  <polygon points="934,594 1318,478 1318,618 934,618" fill="#e5b82e" opacity="0.96"/>
  <circle cx="1127" cy="430" r="96" fill="#fff8e9" stroke="#1e1b16" stroke-width="4"/>
  <circle cx="1127" cy="430" r="66" fill="none" stroke="#1d5fa7" stroke-width="10"/>
  <path d="M1092 456 L1127 365 L1162 456 Z" fill="#0b5d35"/>
  <path d="M1087 472 C1110 458 1143 458 1168 472" fill="none" stroke="#1e1b16" stroke-width="8" stroke-linecap="round"/>

  <text x="96" y="718" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#1e1b16">Cadernos culturais</text>
  <g font-family="Arial, sans-serif">
    <rect x="96" y="754" width="294" height="126" rx="12" fill="#fff8e9" stroke="#d7ba83" stroke-width="2" filter="url(#softShadow)"/>
    <rect x="96" y="754" width="12" height="126" fill="#b51f2a"/>
    <text x="132" y="805" font-size="23" font-weight="700" fill="#1e1b16">Contos Gauchescos</text>
    <text x="132" y="835" font-size="15" fill="#6b3f22">Leitura, fonte e contexto</text>

    <rect x="422" y="754" width="294" height="126" rx="12" fill="#fff8e9" stroke="#d7ba83" stroke-width="2" filter="url(#softShadow)"/>
    <rect x="422" y="754" width="12" height="126" fill="#0b5d35"/>
    <text x="458" y="805" font-size="23" font-weight="700" fill="#1e1b16">Musica e danca</text>
    <text x="458" y="835" font-size="15" fill="#6b3f22">Gaita, milonga, chula e vaneira</text>

    <rect x="748" y="754" width="294" height="126" rx="12" fill="#fff8e9" stroke="#d7ba83" stroke-width="2" filter="url(#softShadow)"/>
    <rect x="748" y="754" width="12" height="126" fill="#e5b82e"/>
    <text x="784" y="805" font-size="23" font-weight="700" fill="#1e1b16">Sabores do Sul</text>
    <text x="784" y="835" font-size="15" fill="#6b3f22">Mate, charque e cozinha campeira</text>

    <rect x="1074" y="754" width="270" height="126" rx="12" fill="#fff8e9" stroke="#d7ba83" stroke-width="2" filter="url(#softShadow)"/>
    <rect x="1074" y="754" width="12" height="126" fill="#6b3f22"/>
    <text x="1110" y="805" font-size="23" font-weight="700" fill="#1e1b16">Simbolos</text>
    <text x="1110" y="835" font-size="15" fill="#6b3f22">Bandeira, hino e brasao</text>
  </g>
</svg>
